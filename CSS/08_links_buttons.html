<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links & Buttons</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    a {
      color: green;
      text-decoration: none;
    }

    a:hover {
      color: red;
      text-decoration: underline;
    }

    /* a:visited {
      color: black;
    } */

    a:active {
      color: greenyellow;
    }

    .btn {
      background: blue;
      color: white;
      border: none;
      font-size: 16px;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      color: white;
      background: yellow;
    }
  </style>
</head>
<body>
  <a class="btn" href="#">My Link</a>
  <br>
  <br>
  <button class="btn">My Button</button>
</body>
</html>
