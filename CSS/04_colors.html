<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colors</title>
  <style>
    h1 {
      /* Color Name */
      color: red;
    }

    h2 {
      /* RGB */
      color: rgb(23, 23, 23);
    }

    h3 {
      /* Hex */
      color: #2121e1
    }
  </style>
</head>
<body>
  <h1>Header 1</h1>
  <h2>Header 2</h2>
  <h3>Header 3</h3>
</body>
</html>
