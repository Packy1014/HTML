<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Basics</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    .flex-container-1 {
      display: flex;
      /* flex-direction: column-reverse; */
      /* flex-wrap: wrap; */
    }

    .flex-container-1 .item {
      background: #f4f4f4;
      border: #ccc solid 2px;
      margin: 10px;
      padding: 10px;
      text-align: center;
      border-radius: 10px;
      flex: 1;
    }

    .item-3 {
      flex: 2;
    }

    .flex-container-2 {
      display: flex;
      background: burlywood;
    }

    .flex-container-2 .item {
      background: #f4f4f4;
      border: #ccc solid 2px;
      margin: 10px;
      padding: 10px;
      text-align: center;
      border-radius: 10px;
    }

    .item-4 {
      flex-basis: 200px;
      flex-grow: 1;
      flex-shrink: 5;
    }

    .item-5 {
      flex-basis: 200px;
      flex-grow: 2;
      flex-shrink: 4;
    }

    .item-6 {
      flex-basis: 200px;
      flex-grow: 1;
      flex-shrink: 1;
    }
  </style>
</head>
<body>
  <div class="flex-container-1">
    <div class="item item-1">
      <h3>Item 1</h3>
    </div>
    <div class="item item-2">
      <h3>Item 2</h3>
    </div>
    <div class="item item-3">
      <h3>Item 3</h3>
    </div>
  </div>
  <div class="flex-container-2">
    <div class="item item-4">
      <h3>Item 4</h3>
    </div>
    <div class="item item-5">
      <h3>Item 5</h3>
    </div>
    <div class="item item-6">
      <h3>Item 6</h3>
    </div>
  </div>
</body>
</html>
