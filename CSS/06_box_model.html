<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Model / Margin & Padding</title>
  <style>
    /* CSS Reset */
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
    }
    .box {
      background: blanchedalmond;
      border: 2px red solid;
      width: 500px;

      padding: 20px;
      padding-top: 10px;
      padding-right: 20px;
      padding-bottom: 10px;
      padding-left: 20px;
      /* Padding shorthand = top, right, bottom, left */
      padding: 10px 20px 10px 20px;
      /* Padding shorthand = top/bottom, left/right */
      padding: 10px 20px;

      margin: 20px;
      margin-top: 10px;
      margin-right: 20px;
      margin-bottom: 10px;
      margin-left: 20px;
      /* margin shorthand = top, right, bottom, left */
      margin: 10px 20px 10px 20px;
      /* margin shorthand = top/bottom, left/right */
      margin: 10px 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h3>Box 1</h3>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. A ad corrupti harum asperiores dignissimos. Modi quasi enim magni facilis expedita?</p>
  </div>
  <div class="box">
    <h3>Box 2</h3>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. A ad corrupti harum asperiores dignissimos. Modi quasi enim magni facilis expedita?</p>
  </div>
</body>
</html>
