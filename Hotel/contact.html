<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Welcome to Hotel">
  <meta name="keywords" content="hotel, tokyo totel">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" media="screen and (max-width: 768px)" href="css/mobile.css">
  <script src="https://kit.fontawesome.com/0a65383f31.js" crossorigin="anonymous"></script>
  <title>Hotel | Contact</title>
</head>
<body>
  <header>
    <nav id="navbar">
      <div class="container">
        <h1 class="logo"><a href="index.html">HBT</a></h1>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a class="current" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <section id="contact-form" class="py-3">
    <div class="container">
      <h1 class="l-heading"><span class="text-primary">Contact</span> Us</h1>
      <p>Please fill out the form below to contact us</p>
      <form action="process.php">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" name="name" id="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" name="email" id="email">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea name="message" id="message"></textarea>
        </div>
        <div class="btn-group">
          <button type="submit" id="submit" class="btn">Submit</button>
          <button type="reset" id="reset" class="btn">Reset</button>
        </div>
      </form>
    </div>
  </section>

  <section id="contact-info" class="bg-dark">
    <div class="container">
      <div class="box">
        <i class="fas fa-hotel fa-3x"></i>
        <h3>Location</h3>
        <p>Tokyo Kotoku</p>
      </div>
      <div class="box">
        <i class="fas fa-phone fa-3x"></i>
        <h3>Phone Number</h3>
        <p>8888-8888</p>
      </div>
      <div class="box">
        <i class="fas fa-envelop fa-3x"></i>
        <h3>Email Address</h3>
        <p>packy@packy.com</p>
      </div>
    </div>
  </section>

  <div class="clr"></div>
  <footer id="main-footer">
    <p>Hotel BT &copy; 2020, All Rights Reserved</p>
  </footer>
</body>
</html>
